  <style>
    * { box-sizing: border-box; }
    body { 
      margin: 0; 
      font-family: 'Inter', sans-serif;
      background: #ffffff;
      overflow-x: hidden;
      padding-top: 60px;
    }

    header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
      color: white;
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 1000;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }

    header h1 {
      margin: 0;
      font-size: 20px;
      font-family: 'Playfair Display', serif;
    }

    header a {
      color: white;
      text-decoration: none;
      margin-left: 2rem;
      transition: opacity 0.3s;
    }

    header a:hover {
      opacity: 0.8;
    }

    @keyframes slideInLeft {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeInScale {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }

    @keyframes infiniteScroll {
      0% { transform: translateX(0); }
      100% { transform: translateX(-33.333%); }
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .ticker-container {
      overflow: hidden;
      background: rgba(255,255,255,0.05);
      padding: 1rem 0;
      border-top: 1px solid rgba(255,255,255,0.1);
      border-bottom: 1px solid rgba(255,255,255,0.1);
      margin-bottom: 2rem;
      width: 100vw;
      position: relative;
      left: 50%;
      right: 50%;
      margin-left: -50vw;
      margin-right: -50vw;
    }

    .ticker-text {
      display: inline-block;
      white-space: nowrap;
      font-size: 16px;
      color: rgba(255,255,255,0.6);
      letter-spacing: 0.5px;
      padding-right: 100px;
    }

    .photo-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 1.5rem;
      margin: 2rem 0;

    .photo-box {
      aspect-ratio: 1;
      background: linear-gradient(135deg, rgba(0,0,0,0.08) 0%, rgba(0,0,0,0.15) 100%);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      color: #999;
      border: 2px dashed #ddd;
      animation: fadeInScale 0.6s ease-out forwards;
      text-align: center;
      padding: 1rem;
      transition: all 0.3s ease;
    }

    .photo-box:nth-child(1) { animation-delay: 0.1s; }
    .photo-box:nth-child(2) { animation-delay: 0.2s; }
    .photo-box:nth-child(3) { animation-delay: 0.3s; }
    .photo-box:nth-child(4) { animation-delay: 0.4s; }
    .photo-box:nth-child(5) { animation-delay: 0.5s; }
    .photo-box:nth-child(6) { animation-delay: 0.6s; }

    .feature-card {
      background: white;
      padding: 1.5rem;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
      transition: all 0.4s ease;
      cursor: pointer;
      border: 2px solid transparent;
      min-height: 140px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      position: relative;
      overflow: hidden;

      border: 1px solid #eee;
      border-radius: 8px;
      margin-bottom: 1rem;
      overflow: hidden;
    }

    .faq-question {

      display: flex;
      justify-content: space-between;
      align-items: center;

      background: #f8f8f8;
      font-weight: 600;
      color: #1a1a1a;
      user-select: none;

    .faq-question:hover {
      background: #f0f0f0;
    }

      line-height: 1.6;

      }

    function useFormspree(formId) {
      const [state, setState] = React.useState({ submitting: false, succeeded: false, errors: [] });

      const handleSubmit = async (e) => {
        e.preventDefault();
        setState({ ...state, submitting: true });

        const formData = new FormData(e.target);
        
        try {
          const response = await fetch(`https://formspree.io/f/${formId}`, {
            method: 'POST',
            body: formData,
            headers: { 'Accept': 'application/json' }
          });

          if (response.ok) {
            setState({ submitting: false, succeeded: true, errors: [] });
            e.target.reset();
          } else {
            setState({ submitting: false, succeeded: false, errors: ['Form submission failed'] });
          }
        } catch (error) {
          setState({ submitting: false, succeeded: false, errors: [error.message] });
        }
      };

      return [state, handleSubmit];
    }
